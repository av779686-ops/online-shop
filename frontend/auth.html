<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plain Store — Welcome</title>
    <link rel="stylesheet" href="style.css">
    <script src="auth.js" defer></script>
</head>
<body class="auth-page">
    <main class="auth-shell">
        <section class="auth-aside" aria-label="Store introduction">
            <a class="brand brand-light" href="auth.html">PLAIN STORE</a>
            <div>
                <p class="eyebrow">Less, but better</p>
                <h1>Good products.<br>Nothing extra.</h1>
            </div>
            <p class="aside-note">A thoughtful collection for everyday life.</p>
        </section>

        <section class="auth-panel">
            <div class="auth-card">
                <div class="auth-tabs" role="tablist" aria-label="Account access">
                    <button class="auth-tab active" type="button" role="tab" aria-selected="true" data-panel="login-panel">Log in</button>
                    <button class="auth-tab" type="button" role="tab" aria-selected="false" data-panel="register-panel">Register</button>
                </div>

                <div id="login-panel" class="auth-content" role="tabpanel">
                    <div class="form-heading">
                        <h2>Welcome back</h2>
                        <p>Enter your details to see the collection.</p>
                    </div>
                    <form id="login-form" class="stack-form">
                        <label>Username<input id="login-username" type="text" autocomplete="username" placeholder="Your username" required minlength="6" maxlength="20"></label>
                        <label>Password<input id="login-password" type="password" autocomplete="current-password" placeholder="Your password" required minlength="8" maxlength="16"></label>
                        <button class="primary-button" type="submit">Log in</button>
                    </form>
                    <p id="login-status" class="status" role="status"></p>
                </div>

                <div id="register-panel" class="auth-content" role="tabpanel" hidden>
                    <div class="form-heading">
                        <h2>Create an account</h2>
                        <p>Join to browse our product collection.</p>
                    </div>
                    <form id="register-form" class="stack-form">
                        <label>Username<input id="register-username" type="text" autocomplete="username" placeholder="6–20 characters" required minlength="6" maxlength="20"></label>
                        <label>Email<input id="register-email" type="email" autocomplete="email" placeholder="you@example.com" required></label>
                        <label>Password<input id="register-password" type="password" autocomplete="new-password" placeholder="8–16 characters" required minlength="8" maxlength="16"></label>
                        <button class="primary-button" type="submit">Create account</button>
                    </form>
                    <p id="register-status" class="status" role="status"></p>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
