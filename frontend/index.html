<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plain Store — Products</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>
    <header class="site-header">
        <a class="brand" href="index.html">PLAIN STORE</a>
        <nav class="nav-actions" aria-label="Account navigation">
            <a id="admin-link" class="text-link" href="admin.html" hidden>Admin</a>
            <span id="user-name" class="user-name"></span>
            <span id="user-money" class="user-money">$0.00</span>
            <button id="logout-button" class="text-button" type="button">Log out</button>
        </nav>
    </header>

    <main class="shop-main">
        <section class="page-intro">
            <p class="eyebrow">The essentials</p>
            <h1>Simple things,<br>made well.</h1>
            <p class="intro-copy">A small collection of everyday products selected for quality and usefulness.</p>
        </section>

        <section aria-labelledby="products-title">
            <div class="section-title-row">
                <h2 id="products-title">All products</h2>
                <span id="product-count" class="muted"></span>
            </div>
            <p id="product-status" class="status" role="status"></p>
            <div id="products-list" class="product-grid" aria-live="polite"></div>
        </section>
        <section class="basket-panel" aria-labelledby="basket-title">
            <div class="section-title-row"><h2 id="basket-title">Your basket</h2><span id="basket-total" class="muted">$0.00</span></div>
            <div id="basket-items" class="basket-items"></div>
            <button id="checkout-button" class="primary-button" type="button">Checkout</button>
            <p id="basket-status" class="status" role="status"></p>
        </section>
    </main>
</body>
</html>
